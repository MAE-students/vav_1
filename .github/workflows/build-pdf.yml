name: Build PDF

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Commit PDF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add main.pdf
          git commit -m "Auto-build PDF" || echo "No changes"
          git push
